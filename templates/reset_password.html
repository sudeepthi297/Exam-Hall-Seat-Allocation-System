<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .form-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; width: 300px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-card">
        {% if step == 'request' %}
        <h2>Reset Password</h2>
        <form action="/forgot_password" method="POST">
            <input type="text" name="id" placeholder="Enter Student ID" required>
            <button type="submit" style="background: #007bff;">Send OTP</button>
        </form>
        
        {% elif step == 'otp' %}
        <h2>Verify OTP</h2>
        <p style="font-size: 12px; color: red;">Note: OTP is displayed in the Python terminal console.</p>
        <form action="/reset_password" method="POST">
            <input type="text" name="otp" placeholder="Enter 6-digit OTP" required>
            <input type="password" name="new_password" placeholder="Enter New Password" required>
            <button type="submit" style="background: #28a745;">Update Password</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
