<style>
    body { font-family: Arial; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
    .form-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; width: 300px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
</style>
<div class="form-card">
    <h2>{{ user_type.capitalize() }} Login</h2>
    <form method="POST">
        <input type="text" name="id" placeholder="{{ 'Student ID' if user_type == 'student' else 'Admin Username' }}" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;">Login</button>
    </form>
    <p style="text-align: center;"><a href="{{ url_for('forgot_password') }}">Forgot Password?</a></p>
    <div style="text-align: center; margin-top: 10px;"><a href="/">Back to Home</a></div>
</div>
